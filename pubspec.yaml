name: ai_money_mentor
description: AI-powered personal finance mentor for India - ET Money Mentor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.0
  
  # File Handling
  file_picker: ^6.1.1
  pdf: ^3.10.7
  
  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  google_sign_in: ^6.2.1
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.2
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  
  # Charts & Visualization
  syncfusion_flutter_charts: ^24.1.41
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Image
  image_picker: ^1.0.7
  
  # JSON
  json_annotation: ^4.8.1
  
  # Icons
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  google_fonts: 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
  